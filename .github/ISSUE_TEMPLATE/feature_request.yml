name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature or enhancement.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Attack module
        - Strategy (multi-turn)
        - Scorer
        - Adapter / Harness
        - Evasion transform
        - CLI
        - Configuration
        - Documentation
        - CI / Supply chain
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a PR for this feature.
