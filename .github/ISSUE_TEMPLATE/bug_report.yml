name: Bug Report
description: Report a bug in agent-inject itself
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Security vulnerabilities**: Do NOT report security issues here.
        Use [private vulnerability reporting](https://github.com/isaacschepp/agent-inject/security/advisories/new) instead.

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: This is a bug in agent-inject itself, not a vulnerability found by agent-inject in a target system.
          required: true
        - label: I searched existing issues and found no duplicate.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      render: Python
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error Output / Traceback
      description: Paste any error messages or tracebacks.
      render: shell

  - type: input
    id: version
    attributes:
      label: agent-inject version
      description: "Run: agent-inject version"
      placeholder: "0.1.1"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: "Run: python --version"
      placeholder: "3.13"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Ubuntu 24.04 / macOS 15 / Windows 11"
